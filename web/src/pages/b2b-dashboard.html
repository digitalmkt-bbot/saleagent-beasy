<!DOCTYPE html>
<html lang="th"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Love Andaman · B2B Sales Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#EEF2F1;--card:#FFFFFF;--ink:#12303A;--ink2:#33474E;--muted:#6B7C7B;--border:#E1E7E5;
 --accent:#0E7C7B;--accent-d:#0A5C5B;--accent-soft:#E1F0EE;--pos:#2E7D46;--neg:#C0392B;--neu:#8A9997;
 --shadow:0 1px 2px rgba(18,48,58,.04),0 1px 3px rgba(18,48,58,.06);}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans Thai","Inter",system-ui,sans-serif;
 font-feature-settings:"tnum" 1;-webkit-font-smoothing:antialiased;line-height:1.5}
.wrap{max-width:1120px;margin:0 auto;padding:22px 20px 60px}
.num{font-variant-numeric:tabular-nums}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:11px}
.mark{width:8px;height:34px;background:var(--accent);border-radius:3px}
.brand h1{font-family:"Inter";font-size:20px;font-weight:600;margin:0;letter-spacing:-.2px}
.brand .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.cov{font-size:11.5px;color:var(--muted);text-align:right;line-height:1.6}
.ctl{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);
 border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);margin-bottom:16px}
.ctl label{font-size:12px;color:var(--muted);margin-right:8px;font-weight:500}
.seg{display:inline-flex;flex-wrap:wrap;background:#EDF1F0;border-radius:9px;padding:3px;gap:2px}
.seg button{border:0;background:none;font:inherit;font-size:12.5px;font-weight:500;color:var(--ink2);padding:6px 13px;border-radius:7px;cursor:pointer}
.seg button.on{background:var(--card);color:var(--accent-d);box-shadow:var(--shadow)}
select,input[type=date],input[type=number]{font:inherit;font-size:13px;color:var(--ink);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer}
select:focus,input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.thr input{width:56px;text-align:center;cursor:text}
.winlab{font-size:12px;color:var(--muted);margin-left:auto}
.winlab b{color:var(--ink2);font-weight:500}
.btn{font:inherit;font-size:12.5px;font-weight:500;color:var(--accent-d);background:var(--accent-soft);border:1px solid #CDE5E2;border-radius:8px;padding:7px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#D4EAE7}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.kpi .k{font-size:12px;color:var(--muted);font-weight:500}
.kpi .v{font-size:25px;font-weight:600;margin-top:5px;letter-spacing:-.4px;font-family:"Inter","Noto Sans Thai"}
.kpi .d{font-size:12.5px;margin-top:3px;font-weight:500}
.pos{color:var(--pos)}.neg{color:var(--neg)}.neu{color:var(--neu)}
.tabs{display:flex;gap:2px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:16px}
.tabs button{border:0;background:none;font:inherit;font-size:13px;font-weight:500;color:var(--muted);padding:9px 14px;border-bottom:2px solid transparent;cursor:pointer;margin-bottom:-1px}
.tabs button.on{color:var(--accent-d);border-bottom-color:var(--accent)}
.panel{animation:fade .18s ease}@keyframes fade{from{opacity:0;transform:translateY(3px)}to{opacity:1}}
.h{font-size:13px;font-weight:600;color:var(--ink2);margin:2px 0 9px;font-family:"Inter","Noto Sans Thai"}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:16px}
.cardhd{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
.cardhd .h{margin:0}
.note{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.7}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:7px 8px;border-bottom:1px solid var(--border)}
td{padding:8px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:0}
td.r,th.r{text-align:right;font-variant-numeric:tabular-nums}
tbody tr:hover{background:#F7FAF9}
tr.clk{cursor:pointer}
.rk{color:var(--muted);font-size:12px;width:26px}
.lnk{color:var(--accent-d);cursor:pointer;text-decoration:none;font-weight:500}
.lnk:hover{text-decoration:underline}
.pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:11px}
.p-g{background:#E4F2E8;color:#2E7D46}.p-l{background:#FBE7E4;color:#C0392B}
.p-s{background:#EDF1F0;color:#5E6E6C}.p-n{background:#E1F0EE;color:#0A5C5B}.p-c{background:#FCEEDD;color:#9A5B12}
.bar{position:relative;width:100%;height:300px}.bar.sm{height:230px}
.mini{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.mini .m{flex:1;min-width:140px;background:#F5F8F7;border-radius:10px;padding:11px 13px}
.mini .m .k{font-size:11.5px;color:var(--muted)}
.mini .m .v{font-size:18px;font-weight:600;margin-top:2px;font-family:"Inter"}
.gsl{display:flex;height:9px;border-radius:5px;overflow:hidden;background:#EDF1F0;min-width:120px;max-width:200px}
.gsl i{display:block;height:100%}
.gsl .sg{background:#3B9E5E}.gsl .ss{background:#B7C4C2}.gsl .sl{background:#D14B3E}
.gsllbl{font-size:11px;color:var(--muted);margin-top:4px;white-space:nowrap}
.gsllbl b{font-weight:600}.gsllbl .cg{color:#2E7D46}.gsllbl .cs{color:#5E6E6C}.gsllbl .cl{color:#C0392B}
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:12px;color:var(--ink2);margin-bottom:10px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
.back{font-size:13px;color:var(--accent-d);cursor:pointer;display:inline-flex;align-items:center;gap:5px;margin-bottom:12px;font-weight:500}
.back:hover{text-decoration:underline}
.shd{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:2px}
.shd h2{font-family:"Inter";font-size:20px;font-weight:600;margin:0}
.shd .role{font-size:12.5px;color:var(--muted)}
.submeta{font-size:12.5px;color:var(--muted);margin-top:3px}
.submeta .lnk{font-weight:500}
.ext{color:var(--muted);text-decoration:none;font-size:13px}
.ext:hover{color:var(--accent)}
.foot{font-size:11px;color:var(--muted);text-align:center;margin-top:28px}
@media(max-width:640px){.winlab{margin-left:0;width:100%}.wrap{padding:16px 13px 50px}}
</style></head>

function attr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function classOf(c,p,T){if(p<=0&&c>0)return 'new';if(c<=0&&p>0)return 'churn';const g=pct(c,p);if(g===null)return 'stable';if(g>T)return 'growth';if(g<-T)return 'loss';return 'stable';}

function windows(){const ref=D(state.ref),m=state.mode;let cs,ce,ps,pe;
 if(m==='yoymonth'){cs=new Date(ref.getFullYear(),ref.getMonth(),1);ce=new Date(ref.getFullYear(),ref.getMonth()+1,0);ps=new Date(ref.getFullYear()-1,ref.getMonth(),1);pe=new Date(ref.getFullYear()-1,ref.getMonth()+1,0);return{cs,ce,ps,pe};}
 let len=(m==='week'||m==='yoyweek')?7:(m==='roll12'?365:30);ce=ref;cs=shift(ref,-(len-1));
 if(m==='yoyweek'){ps=shift(cs,-364);pe=shift(ce,-364);}else{pe=shift(cs,-1);ps=shift(pe,-(len-1));}return{cs,ce,ps,pe};}
function inWin(r,a,b){const s=r[state.basis];if(!s)return false;const d=D(s);return d>=a&&d<=b;}

function classify(w){const cur={},prev={},meta={},T=state.thr;
 for(const r of DATA){const k=r.agid;if(!meta[k])meta[k]={k,ag:r.ag,code:r.code,own:r.own,mkt:r.mkt};
  if(inWin(r,w.cs,w.ce))cur[k]=(cur[k]||0)+r.rev;if(inWin(r,w.ps,w.pe))prev[k]=(prev[k]||0)+r.rev;}
 const out=[];for(const k of new Set([...Object.keys(cur),...Object.keys(prev)])){const c=cur[k]||0,p=prev[k]||0;
  out.push({...meta[k],cur:c,prev:p,d:c-p,g:pct(c,p),cls:classOf(c,p,T)});}return out;}
function cnt(sub){return{g:sub.filter(r=>r.cls==='growth'||r.cls==='new').length,s:sub.filter(r=>r.cls==='stable').length,l:sub.filter(r=>r.cls==='loss'||r.cls==='churn').length};}
function gslBar(c){const t=(c.g+c.s+c.l)||1,pc=n=>n/t*100;
 return '<div class="gsl"><i class="sg" style="width:'+pc(c.g)+'%"></i><i class="ss" style="width:'+pc(c.s)+'%"></i><i class="sl" style="width:'+pc(c.l)+'%"></i></div>'
  +'<div class="gsllbl"><b class="cg">'+c.g+'</b> โต · <b class="cs">'+c.s+'</b> นิ่ง · <b class="cl">'+c.l+'</b> หด</div>';}
function monthly(pred){const mm={};for(const r of DATA){const s=r[state.basis];if(!s)continue;if(pred&&!pred(r))continue;
  const k=s.slice(0,7);if(!/^\d{4}-\d{2}$/.test(k))continue;(mm[k]=mm[k]||{rev:0,pax:0,byOwner:{}}).rev+=r.rev;mm[k].pax+=r.pax;mm[k].byOwner[r.own]=(mm[k].byOwner[r.own]||0)+r.rev;}return mm;}
function ownerOrder(){const t={};for(const r of DATA)t[r.own]=(t[r.own]||0)+r.rev;return Object.keys(t).sort((a,b)=>t[b]-t[a]);}

// link + cell helpers
function lkA(id,name){return '<a class="lnk" data-nav="agent:'+attr(id)+'">'+esc(name)+'</a>';}
function lkS(o){return '<a class="lnk" data-nav="staff:'+attr(o)+'">'+esc(o)+'</a>';}
function lkM(m){return '<a class="lnk" data-nav="market:'+attr(m)+'">'+esc(m)+'</a>';}
function extBtn(id,code){return '<a class="ext" title="เปิดในระบบงาน sales" onclick="openAgent(\''+attr(id)+'\',\''+attr(code)+'\')" style="cursor:pointer">↗</a>';}
function cellAg(r){return lkA(r.k,r.ag)+' '+extBtn(r.k,r.code);}
function openAgent(id,code){if(SALES_SYS_URL){window.open(SALES_SYS_URL.replace('{id}',id).replace('{code}',encodeURIComponent(code)),'_blank');}else{alert('ลิงก์ไปยังระบบงาน sales — จะเชื่อมเมื่อกำหนด URL ของระบบนั้น\n(agent code: '+code+' · id: '+id+')');}}
function dcell(r){const p=r.g;if(r.cls==='churn')return '<span class="neg">churned</span>';if(r.cls==='new')return '<span class="pos">new</span>';return '<span class="'+dcls(p)+'">'+dstr(p)+'</span>';}
function badge(cls){const m={growth:['p-g','Growth'],new:['p-n','New'],loss:['p-l','Loss'],churn:['p-c','Churned'],stable:['p-s','Stable']};const b=m[cls];return '<span class="pill '+b[0]+'">'+b[1]+'</span>';}
function kMini(k,v,d,c){return '<div class="m"><div class="k">'+k+'</div><div class="v">'+v+'</div>'+(d?'<div class="d '+c+'" style="font-size:12px">'+d+'</div>':'')+'</div>';}
function barOpts(){return{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtC(c.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#6B7C7B'}},y:{ticks:{callback:v=>fmtC(v),font:{size:11},color:'#6B7C7B'},grid:{color:'#EDF1F0'},beginAtZero:true}}};}
function tbl(head,rows,rAlign,rank){let h='<table><thead><tr>'+head.map((x,i)=>'<th class="'+(rAlign[i]?'r':'')+(rank&&i===0?' rk':'')+'">'+x+'</th>').join('')+'</tr></thead><tbody>';
 h+=rows.map(row=>'<tr>'+row.map((c,i)=>'<td class="'+(rAlign[i]?'r':'')+(rank&&i===0?' rk':'')+'">'+c+'</td>').join('')+'</tr>').join('');return h+'</tbody></table>';}
function stripe(col){const cv=document.createElement('canvas');cv.width=cv.height=7;const x=cv.getContext('2d');x.fillStyle='#F1EFF3';x.fillRect(0,0,7,7);x.strokeStyle=col;x.lineWidth=2;x.beginPath();x.moveTo(0,7);x.lineTo(7,0);x.moveTo(-2,2);x.lineTo(2,-2);x.moveTo(5,9);x.lineTo(9,5);x.stroke();return x.createPattern(cv,'repeat');}
function waterfall(id,seq){charts.push(new Chart(document.getElementById(id),{type:'bar',data:{labels:seq.map(s=>s[0]),datasets:[{data:seq.map(s=>[s[1],s[2]]),backgroundColor:seq.map(s=>['Prev','Stable'].includes(s[0])?stripe(s[3]):s[3]),borderRadius:5,barPercentage:.5,categoryPercentage:.72}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const v=c.raw,d=v[1]-v[0];return (d<0?'−':'')+fmtC(Math.abs(d));}}}},
   scales:{x:{ticks:{autoSkip:false,font:{size:12,family:'Inter'},color:'#6B7C7B'},grid:{display:false}},y:{ticks:{callback:v=>fmtC(v),font:{size:11},color:'#6B7C7B'},grid:{color:'#EDF1F0'},beginAtZero:true}}}}));}

function render(){const w=windows();window._w=w;
 document.getElementById('win').innerHTML='ช่วง <b>'+fmtd(w.cs)+' – '+fmtd(w.ce)+'</b> เทียบ '+fmtd(w.ps)+' – '+fmtd(w.pe);
 const cls=classify(w);window._cls=cls;
 const curTot=cls.reduce((s,r)=>s+r.cur,0),prevTot=cls.reduce((s,r)=>s+r.prev,0);window._tot={curTot,prevTot};
 const cur=DATA.filter(r=>inWin(r,w.cs,w.ce)),prev=DATA.filter(r=>inWin(r,w.ps,w.pe));
 const curPax=cur.reduce((s,r)=>s+r.pax,0),prevPax=prev.reduce((s,r)=>s+r.pax,0);
 const nA=cls.filter(r=>r.cur>0).length,nP=cls.filter(r=>r.prev>0).length;
 const avg=nA?curTot/nA:0,avgP=nP?prevTot/nP:0,dn=nA-nP;
 document.getElementById('kpis').innerHTML=
  '<div class="kpi"><div class="k">B2B revenue</div><div class="v num">'+fmtC(curTot)+'</div><div class="d '+dcls(pct(curTot,prevTot))+'">'+dstr(pct(curTot,prevTot))+'</div></div>'
 +'<div class="kpi"><div class="k">Active agents</div><div class="v num">'+nA+'</div><div class="d '+(dn>0?'pos':dn<0?'neg':'neu')+'">'+(dn>0?'+':dn<0?'−':'')+Math.abs(dn)+' agent</div></div>'
 +'<div class="kpi"><div class="k">Pax</div><div class="v num">'+curPax.toLocaleString()+'</div><div class="d '+dcls(pct(curPax,prevPax))+'">'+dstr(pct(curPax,prevPax))+'</div></div>'
 +'<div class="kpi"><div class="k">Avg / agent</div><div class="v num">'+fmtC(avg)+'</div><div class="d '+dcls(pct(avg,avgP))+'">'+dstr(pct(avg,avgP))+'</div></div>';
 renderBody();}
function warnBox(){return window._cls.every(r=>r.prev===0)?'<div class="note">⚠ ช่วงเทียบไม่มีข้อมูล (ประวัติเริ่ม ธ.ค. 2025) — WoW/MoM ใช้ได้, YoY จะสมบูรณ์เมื่อสะสมครบปี</div>':'';}

function renderBody(){clearCharts();const sc=state.screen,warn=warnBox(),cls=window._cls;
 if(sc.kind==='tab'){const t=sc.tab;
  if(t==='ov')return ovTab(cls,warn);
  if(t==='staff')return staffList(cls,warn);
  if(t==='trip')return tripTab(warn);
  if(t==='mkt')return mktTab(cls,warn);
  if(t==='grow')return clsTab(cls,['growth','new'],'Growth','p-g',warn,'อัดต่อ — เพิ่ม allotment / rate incentive');
  if(t==='loss')return clsTab(cls,['loss','churn'],'Loss','p-l',warn,'win-back / หา cause — เทียบ product กับราคาคู่แข่ง');
  if(t==='stab')return clsTab(cls,['stable'],'Stable','p-s',warn,'รักษา — service ต่อเนื่อง, มองโอกาส upsell');}
 if(sc.kind==='agent')return agentDetail(sc.id,warn);
 if(sc.kind==='staff')return staffDetail(sc.id,warn);
 if(sc.kind==='market')return marketDetail(sc.id,warn);}
function go(sc){state.stack.push(state.screen);state.screen=sc;renderBody();window.scrollTo({top:0,behavior:'smooth'});}
function back(){if(state.stack.length){state.screen=state.stack.pop();renderBody();window.scrollTo({top:0,behavior:'smooth'});}}
function selTrip(f){state.trip=f;renderBody();}

function ovTab(cls,warn){const c=window._tot,P=c.prevTot;
 const gr=cls.filter(r=>r.cls==='growth'),nw=cls.filter(r=>r.cls==='new'),st=cls.filter(r=>r.cls==='stable'),ls=cls.filter(r=>r.cls==='loss'),ch=cls.filter(r=>r.cls==='churn');
 const S=(a,f)=>a.reduce((s,r)=>s+f(r),0);
 const gD=S(gr,r=>r.d),nD=S(nw,r=>r.cur),sD=S(st,r=>r.d),lD=S(ls,r=>r.prev-r.cur),cD=S(ch,r=>r.prev);
 const seq=[['Prev',0,P,'#A1A1AA'],['Growth',P,P+gD,'#18181B'],['New',P+gD,P+gD+nD,'#18181B'],['Stable',P+gD+nD,P+gD+nD+sD,'#D4D4D8'],['Loss',P+gD+nD+sD-lD,P+gD+nD+sD,'#FF4D1D'],['Churn',P+gD+nD+sD-lD-cD,P+gD+nD+sD-lD,'#FF4D1D'],['Now',0,c.curTot,'#18181B']];
 const watch=[...ls,...ch].sort((a,b)=>(b.prev-b.cur)-(a.prev-a.cur)).slice(0,10);
 document.getElementById('body').innerHTML='<div class="panel">'
  +'<div class="card"><div class="h">Revenue bridge — ที่มาของการเปลี่ยนแปลง</div><div class="mini">'
   +kMini('ได้เพิ่ม','+'+fmtC(gD+nD),'','')+kMini('เสียไป','−'+fmtC(lD+cD),'','')+kMini('สุทธิ',((c.curTot-P)>=0?'+':'−')+fmtC(Math.abs(c.curTot-P)),'','')
   +'</div><div class="bar"><canvas id="bg"></canvas></div>'+warn+'</div>'
  +'<div class="card"><div class="h">Watchlist — agent เสียเงินมากสุด</div>'
  +tbl(['Agent','Owner','Market','฿ ที่หาย','Δ'],watch.map(r=>[cellAg(r),lkS(r.own),lkM(r.mkt),'<span class="neg">−'+fmtC(r.prev-r.cur)+'</span>',dcell(r)]),[0,0,0,1,1])
  +(watch.length?'':'<div class="note">ไม่มี agent ที่ยอดลดในช่วงนี้</div>')+'</div></div>';
 waterfall('bg',seq);}

function staffList(cls,warn){const owners=ownerOrder(),mm=monthly(),months=Object.keys(mm).sort();
 const rows=owners.map(o=>{const sub=cls.filter(r=>r.own===o);return{o,cur:sub.reduce((s,r)=>s+r.cur,0),prev:sub.reduce((s,r)=>s+r.prev,0),na:sub.filter(r=>r.cur>0).length,c:cnt(sub)};}).sort((a,b)=>b.cur-a.cur);
 const oc={};owners.forEach((o,i)=>oc[o]=OPAL[i%OPAL.length]);
 const leg='<div class="legend">'+owners.map(o=>'<span><i style="background:'+oc[o]+'"></i>'+esc(o)+'</span>').join('')+'</div>';
 let t='<table><thead><tr><th>Owner</th><th class="r">Agents</th><th class="r">Rev</th><th class="r">Δ</th><th>G / S / L</th></tr></thead><tbody>';
 t+=rows.map(r=>'<tr class="clk" data-nav="staff:'+attr(r.o)+'"><td style="font-weight:500"><span class="lnk">'+esc(r.o)+'</span></td><td class="r">'+r.na+'</td><td class="r">'+fmtC(r.cur)+'</td><td class="r">'+dcell({g:pct(r.cur,r.prev)})+'</td><td>'+gslBar(r.c)+'</td></tr>').join('')+'</tbody></table>';
 document.getElementById('body').innerHTML='<div class="panel">'
  +'<div class="card"><div class="h">Performance รายเดือน (ตาม '+(state.basis==='bd'?'วันจอง':'วันเดินทาง')+')</div>'+leg+'<div class="bar"><canvas id="mc"></canvas></div><div class="note">แต่ละแท่ง = 1 เดือน ซ้อนตาม owner — เห็นเทรนด์รวมและสัดส่วนแต่ละคน</div></div>'
  +'<div class="card"><div class="h">สรุปราย staff (กดชื่อเพื่อดูรายละเอียด)</div>'+t+'<div class="note">แถบ G/S/L: เขียว=โต · เทา=นิ่ง · แดง=หด (เกณฑ์ ±'+state.thr+'%)</div></div></div>';
 const ds=owners.map(o=>({label:o,data:months.map(m=>Math.round(mm[m].byOwner[o]||0)),backgroundColor:oc[o],stack:'s',borderWidth:0}));
 charts.push(new Chart(document.getElementById('mc'),{type:'bar',data:{labels:months.map(mlab),datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmtC(c.raw)}}},scales:{x:{stacked:true,grid:{display:false},ticks:{font:{size:11},color:'#6B7C7B'}},y:{stacked:true,ticks:{callback:v=>fmtC(v),font:{size:11},color:'#6B7C7B'},grid:{color:'#EDF1F0'}}}}}));}

function staffDetail(owner,warn){const w=window._w,T=state.thr,cls=window._cls.filter(r=>r.own===owner);
 const cur=cls.reduce((s,r)=>s+r.cur,0),prev=cls.reduce((s,r)=>s+r.prev,0);
 const paxCur=DATA.filter(r=>r.own===owner&&inWin(r,w.cs,w.ce)).reduce((s,r)=>s+r.pax,0);
 const na=cls.filter(r=>r.cur>0).length,share=window._tot.curTot?cur/window._tot.curTot*100:0,c=cnt(cls);
 const info={};for(const r of DATA){if(r.own!==owner||!inWin(r,w.cs,w.ce))continue;if(!info[r.agid])info[r.agid]={fam:{}};info[r.agid].fam[r.fam]=(info[r.agid].fam[r.fam]||0)+r.rev;}
 const pf=a=>{const f=info[a]&&info[a].fam;if(!f)return '—';return Object.entries(f).sort((x,y)=>y[1]-x[1])[0][0];};
 const ags=cls.slice().sort((a,b)=>b.cur-a.cur||b.prev-a.prev);
 const mm=monthly(r=>r.own===owner),months=Object.keys(mm).sort();
 document.getElementById('body').innerHTML='<div class="panel"><div class="back" data-nav="back">‹ กลับ</div>'
  +'<div class="card"><div class="shd"><h2>'+esc(owner)+'</h2><span class="role">'+(ROLE[owner]||'Sales Executive')+'</span></div>'
  +'<div class="mini" style="margin-top:12px">'+kMini('Revenue',fmtC(cur),dstr(pct(cur,prev)),dcls(pct(cur,prev)))+kMini('Active agents',na,'','')+kMini('Pax',paxCur.toLocaleString(),'','')+kMini('สัดส่วนทีม',share.toFixed(0)+'%','','')+'</div>'
  +'<div style="margin-top:8px">'+gslBar(c)+'</div></div>'
  +'<div class="card"><div class="h">Revenue รายเดือน (ตาม '+(state.basis==='bd'?'วันจอง':'วันเดินทาง')+')</div><div class="bar sm"><canvas id="sd"></canvas></div></div>'
  +'<div class="card"><div class="h">Agent ในพอร์ต ('+ags.length+')</div>'
  +tbl(['Agent','Market','Trip','Rev','Δ','Class'],ags.map(r=>[cellAg(r),lkM(r.mkt),pf(r.k),fmtC(r.cur),dcell(r),badge(r.cls)]),[0,0,0,1,1,0])
  +'<div class="note">↗ ข้างชื่อ = ลิงก์ระบบงาน sales · กดชื่อ agent เข้าหน้า agent · กด market เข้าหน้า market</div>'+warn+'</div></div>';
 charts.push(new Chart(document.getElementById('sd'),{type:'bar',data:{labels:months.map(mlab),datasets:[{data:months.map(m=>Math.round(mm[m].rev)),backgroundColor:'#0E7C7B',borderRadius:3,barPercentage:.65}]},options:barOpts()}));}

function tripTab(warn){const w=window._w,T=state.thr;const fam={},famTot={},agAll={};
 for(const r of DATA){const iC=inWin(r,w.cs,w.ce),iP=inWin(r,w.ps,w.pe);if(!iC&&!iP)continue;
  if(!agAll[r.agid])agAll[r.agid]={cur:0,prev:0};if(iC)agAll[r.agid].cur+=r.rev;if(iP)agAll[r.agid].prev+=r.rev;
  const f=r.fam;fam[f]=fam[f]||{};famTot[f]=famTot[f]||{cur:0,prev:0,pax:0};
  const a=fam[f][r.agid]=fam[f][r.agid]||{k:r.agid,ag:r.ag,code:r.code,own:r.own,mkt:r.mkt,cur:0,prev:0};
  if(iC){a.cur+=r.rev;famTot[f].cur+=r.rev;famTot[f].pax+=r.pax;}if(iP){a.prev+=r.rev;famTot[f].prev+=r.rev;}}
 const order=['Phi Phi','Similan','Surin','Krabi','อื่นๆ'],fams=order.filter(f=>famTot[f]&&(famTot[f].cur||famTot[f].prev));
 if(!fams.length){document.getElementById('body').innerHTML='<div class="panel"><div class="card"><div class="note">ไม่มีข้อมูลทริปในช่วงนี้</div></div></div>';return;}
 if(!state.trip||!fams.includes(state.trip))state.trip=fams[0];
 const F=state.trip,ft=famTot[F];
 const list=Object.values(fam[F]).map(a=>{const aa=agAll[a.k]||{cur:0,prev:0};return{...a,cls:classOf(a.cur,a.prev,T),g:pct(a.cur,a.prev),og:pct(aa.cur,aa.prev)};}).sort((x,y)=>y.cur-x.cur||y.prev-x.prev);
 const c={g:list.filter(r=>r.cls==='growth'||r.cls==='new').length,s:list.filter(r=>r.cls==='stable').length,l:list.filter(r=>r.cls==='loss'||r.cls==='churn').length};
 const sel='<span class="seg" id="tripsel">'+fams.map(f=>'<button '+(f===F?'class="on" ':'')+'onclick="selTrip(\''+f+'\')">'+f+' <span style="opacity:.6">'+fmtC(famTot[f].cur)+'</span></button>').join('')+'</span>';
 function sig(r){if(r.cls==='loss'||r.cls==='churn'){if(r.og!==null&&r.og>-T)return '<span class="pill p-c">↘ ลดเส้นนี้ · ไปเส้นอื่น</span>';return '<span class="pill p-l">↘ ลดทั้งพอร์ต</span>';}if(r.cls==='growth'&&r.og!==null&&r.og<=T)return '<span class="pill p-n">↗ ดึงมาเส้นนี้</span>';return '';}
 const rows=list.map((r,i)=>[String(i+1),cellAg(r),lkS(r.own),lkM(r.mkt),fmtC(r.cur),dcell(r),badge(r.cls),sig(r)]);
 document.getElementById('body').innerHTML='<div class="panel">'
  +'<div style="margin-bottom:14px"><label style="font-size:12px;color:var(--muted);margin-right:8px;font-weight:500">เลือกทริป</label>'+sel+'</div>'
  +'<div class="card"><div class="shd"><h2 style="font-size:18px">'+F+'</h2><span class="role">'+fmtC(ft.cur)+' · '+dstr(pct(ft.cur,ft.prev))+' · '+list.filter(r=>r.cur>0).length+' agents · '+ft.pax.toLocaleString()+' pax</span></div><div style="margin-top:8px">'+gslBar(c)+'</div></div>'
  +'<div class="card"><div class="h">Agent ทั้งหมดที่ส่งเส้นนี้ ('+list.length+') — เรียงตามยอด</div>'
  +tbl(['#','Agent','Owner','Market','Rev','Δ เส้นนี้','Class','สัญญาณ'],rows,[0,0,0,0,1,1,0,0],true)
  +'<div class="note">Class + Δ คิด<b>เฉพาะเส้นนี้</b> · สัญญาณเทียบพอร์ตรวม: <b style="color:#9A5B12">ไปเส้นอื่น</b> = ลดเส้นนี้แต่รวมยังโต/ทรง · <b style="color:#C0392B">ลดทั้งพอร์ต</b> = เสี่ยงจริง · <b style="color:#0A5C5B">ดึงมาเส้นนี้</b> = โตเส้นนี้แต่รวมทรง</div>'+warn+'</div></div>';}

function mktTab(cls,warn){const groups={};for(const r of cls){const g=r.mkt||'—';(groups[g]=groups[g]||[]).push(r);}
 const rows=Object.entries(groups).map(([g,sub])=>[g,sub.filter(r=>r.cur>0).length,sub.reduce((s,r)=>s+r.cur,0),sub.reduce((s,r)=>s+r.prev,0)]).sort((a,b)=>b[2]-a[2]);
 const T=window._tot.curTot;
 document.getElementById('body').innerHTML='<div class="panel"><div class="card"><div class="h">Market (กดชื่อเพื่อดู agent ในตลาดนั้น)</div>'
  +tbl(['Market','Agents','Rev','Δ','% total'],rows.map(r=>[lkM(r[0]),r[1],fmtC(r[2]),dcell({g:pct(r[2],r[3])}),(r[2]/T*100||0).toFixed(0)+'%']),[0,1,1,1,1])+warn+'</div></div>';}

function marketDetail(name,warn){const w=window._w,T=state.thr;const am={},tot={cur:0,prev:0,pax:0};
 for(const r of DATA){if(r.mkt!==name)continue;const iC=inWin(r,w.cs,w.ce),iP=inWin(r,w.ps,w.pe);if(!iC&&!iP)continue;
  const a=am[r.agid]=am[r.agid]||{k:r.agid,ag:r.ag,code:r.code,own:r.own,cur:0,prev:0};if(iC){a.cur+=r.rev;tot.cur+=r.rev;tot.pax+=r.pax;}if(iP){a.prev+=r.rev;tot.prev+=r.rev;}}
 const list=Object.values(am).map(a=>({...a,cls:classOf(a.cur,a.prev,T),g:pct(a.cur,a.prev)})).sort((x,y)=>y.cur-x.cur||y.prev-x.prev);
 const c=cnt(list),na=list.filter(r=>r.cur>0).length,share=window._tot.curTot?tot.cur/window._tot.curTot*100:0;
 const mm=monthly(r=>r.mkt===name),months=Object.keys(mm).sort();
 document.getElementById('body').innerHTML='<div class="panel"><div class="back" data-nav="back">‹ กลับ</div>'
  +'<div class="card"><div class="shd"><h2>'+esc(name)+'</h2><span class="role">market</span></div>'
  +'<div class="mini" style="margin-top:12px">'+kMini('Revenue',fmtC(tot.cur),dstr(pct(tot.cur,tot.prev)),dcls(pct(tot.cur,tot.prev)))+kMini('Active agents',na,'','')+kMini('Pax',tot.pax.toLocaleString(),'','')+kMini('สัดส่วนรวม',share.toFixed(0)+'%','','')+'</div><div style="margin-top:8px">'+gslBar(c)+'</div></div>'
  +'<div class="card"><div class="h">Revenue รายเดือน (ตาม '+(state.basis==='bd'?'วันจอง':'วันเดินทาง')+')</div><div class="bar sm"><canvas id="md"></canvas></div></div>'
  +'<div class="card"><div class="h">Agent ในตลาดนี้ ('+list.length+') — เรียงตามยอด</div>'
  +tbl(['#','Agent','Owner','Rev','Δ','Class'],list.map((r,i)=>[String(i+1),cellAg(r),lkS(r.own),fmtC(r.cur),dcell(r),badge(r.cls)]),[0,0,0,1,1,0],true)+warn+'</div></div>';
 charts.push(new Chart(document.getElementById('md'),{type:'bar',data:{labels:months.map(mlab),datasets:[{data:months.map(m=>Math.round(mm[m].rev)),backgroundColor:'#0E7C7B',borderRadius:3,barPercentage:.65}]},options:barOpts()}));}

function agentDetail(id,warn){const w=window._w,T=state.thr;const all=DATA.filter(r=>r.agid===id);
 if(!all.length){document.getElementById('body').innerHTML='<div class="panel"><div class="back" data-nav="back">‹ กลับ</div><div class="card"><div class="note">ไม่พบข้อมูล agent</div></div></div>';return;}
 const name=all[0].ag,code=all[0].code,own=all[0].own;
 const mc={};all.forEach(r=>mc[r.mkt]=(mc[r.mkt]||0)+r.rev);const mkt=Object.entries(mc).sort((a,b)=>b[1]-a[1])[0][0];
 const cur=all.filter(r=>inWin(r,w.cs,w.ce)),prev=all.filter(r=>inWin(r,w.ps,w.pe));
 const S=(a,f)=>a.reduce((s,r)=>s+f(r),0);
 const cRev=S(cur,r=>r.rev),pRev=S(prev,r=>r.rev),cPax=S(cur,r=>r.pax),nb=cur.length,cls=classOf(cRev,pRev,T);
 const fm={};cur.forEach(r=>{(fm[r.fam]=fm[r.fam]||{cur:0,prev:0,pax:0,n:0});fm[r.fam].cur+=r.rev;fm[r.fam].pax+=r.pax;fm[r.fam].n++;});
 prev.forEach(r=>{(fm[r.fam]=fm[r.fam]||{cur:0,prev:0,pax:0,n:0}).prev+=r.rev;});
 const famRows=Object.entries(fm).sort((a,b)=>b[1].cur-a[1].cur).map(([f,v])=>{const cc=classOf(v.cur,v.prev,T);return [f,v.n,v.pax.toLocaleString(),fmtC(v.cur),dcell({g:pct(v.cur,v.prev),cls:cc}),badge(cc)];});
 const bl=cur.slice().sort((a,b)=>String(b[state.basis]||'').localeCompare(String(a[state.basis]||''))).slice(0,40).map(r=>[r.bd||'—',r.td||'—',r.fam,r.pax,fmtC(r.rev)]);
 const mm=monthly(r=>r.agid===id),months=Object.keys(mm).sort();
 document.getElementById('body').innerHTML='<div class="panel"><div class="back" data-nav="back">‹ กลับ</div>'
  +'<div class="card"><div class="shd"><h2>'+esc(name)+'</h2>'+badge(cls)+' <span class="ext" onclick="openAgent(\''+attr(id)+'\',\''+attr(code)+'\')" style="cursor:pointer;font-size:13px">เปิดในระบบงาน sales ↗</span></div>'
  +'<div class="submeta">code '+esc(code)+' · owner '+lkS(own)+' · market '+lkM(mkt)+'</div>'
  +'<div class="mini" style="margin-top:12px">'+kMini('Revenue',fmtC(cRev),dstr(pct(cRev,pRev)),dcls(pct(cRev,pRev)))+kMini('Pax',cPax.toLocaleString(),'','')+kMini('Bookings',nb,'','')+kMini('เส้นที่ส่ง',Object.keys(fm).length,'','')+'</div></div>'
  +'<div class="card"><div class="h">Revenue รายเดือน (ตาม '+(state.basis==='bd'?'วันจอง':'วันเดินทาง')+')</div><div class="bar sm"><canvas id="ad"></canvas></div></div>'
  +'<div class="card"><div class="h">ส่งเส้นทางไหนบ้าง (ในช่วงที่เลือก)</div>'+tbl(['Trip','Bookings','Pax','Rev','Δ','Class'],famRows,[0,1,1,1,1,0])+'</div>'
  +'<div class="card"><div class="h">รายการ booking (ล่าสุด '+bl.length+')</div>'+tbl(['วันจอง','วันเดินทาง','Trip','Pax','฿'],bl,[0,0,0,1,1])+(bl.length?'':'<div class="note">ไม่มี booking ในช่วงที่เลือก</div>')+'</div>'+warn+'</div>';
 charts.push(new Chart(document.getElementById('ad'),{type:'bar',data:{labels:months.map(mlab),datasets:[{data:months.map(m=>Math.round(mm[m].rev)),backgroundColor:'#0E7C7B',borderRadius:3,barPercentage:.65}]},options:barOpts()}));}

function clsTab(cls,which,title,pc,warn,action){const rows=cls.filter(r=>which.includes(r.cls)).sort((a,b)=>b.cur-a.cur||b.prev-a.prev);
 const delta=rows.reduce((s,r)=>s+(r.cls==='loss'||r.cls==='churn'?r.prev-r.cur:r.cls==='new'?r.cur:r.d),0);
 const lbl=title==='Loss'?'−'+fmtC(delta):title==='Growth'?'+'+fmtC(delta):'±'+fmtC(Math.abs(delta));
 document.getElementById('body').innerHTML='<div class="panel"><div class="card"><div class="h"><span class="pill '+pc+'">'+title+' · '+rows.length+' agents · '+lbl+'</span></div>'
  +tbl(['Agent','Owner','Market','Rev','Δ','Class'],rows.map(r=>[cellAg(r),lkS(r.own),lkM(r.mkt),fmtC(r.cur),dcell(r),badge(r.cls)]),[0,0,0,1,1,0])
  +'<div class="note">Action: '+action+' · กดชื่อ agent/owner/market เข้าหน้ารายละเอียดได้</div>'+warn+'</div></div>';}

function exportCSV(){const tables=document.querySelectorAll('#body table');if(!tables.length){alert('ไม่มีตารางให้ export ในหน้านี้');return;}
 let csv='\uFEFF';tables.forEach((t,ti)=>{if(ti)csv+='\n';t.querySelectorAll('tr').forEach(tr=>{const cells=[...tr.children].map(td=>{let v=td.textContent.replace(/\s+/g,' ').trim();if(/[",\n]/.test(v))v='"'+v.replace(/"/g,'""')+'"';return v;});csv+=cells.join(',')+'\n';});});
 const sc=state.screen,tag=sc.kind==='tab'?sc.tab+(sc.tab==='trip'&&state.trip?'_'+state.trip:''):sc.kind+'_'+sc.id;
 const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=('LA_'+tag+'_'+state.ref+'.csv').replace(/[^\w.\-]/g,'_');a.click();URL.revokeObjectURL(a.href);}

document.getElementById('cov').innerHTML='ข้อมูลในระบบ · จอง 8 ธ.ค. 25 – 17 ก.ค. 26<br>เดินทาง มิ.ย. 26 – ม.ค. 27 · 1,176 booking';
document.getElementById('basis').onclick=e=>{const b=e.target.closest('button');if(!b)return;state.basis=b.dataset.v;[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));render();};
document.getElementById('mode').onchange=e=>{state.mode=e.target.value;render();};
document.getElementById('ref').onchange=e=>{state.ref=e.target.value;render();};
document.getElementById('thr').onchange=e=>{let v=parseFloat(e.target.value);if(isNaN(v)||v<1)v=1;if(v>50)v=50;state.thr=v;e.target.value=v;render();};
document.getElementById('exp').onclick=exportCSV;
document.getElementById('tabs').onclick=e=>{const b=e.target.closest('button');if(!b)return;state.stack=[];state.screen={kind:'tab',tab:b.dataset.t};[...e.currentTarget.children].forEach(x=>x.classList.toggle('on',x===b));renderBody();};
document.getElementById('body').addEventListener('click',e=>{const el=e.target.closest('[data-nav]');if(!el)return;const nav=el.dataset.nav;if(nav==='back'){back();return;}const i=nav.indexOf(':');go({kind:nav.slice(0,i),id:nav.slice(i+1)});});
render();
</script>
</body></html>
