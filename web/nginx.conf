server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # proxy API calls to the backend service
  location /api/ {
    proxy_pass http://server:4000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html;
  }
}
