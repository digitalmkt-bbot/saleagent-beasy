# Railway/Nixpacks — build frontend แล้วให้ backend เสิร์ฟทั้งหมด (บริการเดียว)
[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "cd server && npm install --omit=dev",
  "cd web && npm install"
]

[phases.build]
cmds = ["cd web && npm run build"]

[start]
cmd = "node server/src/index.js"
